<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 구글 시트 대시보드</title>
    <!-- Chart.js 라이브러리 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary-color: #4a90e2;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        /* 대시보드 카드 레이아웃 */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card h3 {
            margin: 0;
            font-size: 0.9rem;
            color: #666;
        }

        .card div {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 10px;
            color: var(--primary-color);
        }

        /* 차트 영역 */
        .chart-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .status {
            font-size: 0.8rem;
            text-align: right;
            margin-top: 10px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>실시간 데이터 대시보드</h1>
        <p id="current-time">기준 시간: 2026-06-16 13:10:00</p>
    </header>

    <div class="stats-container">
        <div class="card">
            <h3>전체 항목 수</h3>
            <div id="total-count">0</div>
        </div>
        <div class="card">
            <h3>최근 업데이트 값</h3>
            <div id="last-value">0</div>
        </div>
        <div class="card">
            <h3>상태</h3>
            <div id="sync-status" style="color: #2ecc71;">정상</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="myChart"></canvas>
    </div>

    <p class="status">데이터는 30초마다 자동으로 갱신됩니다. <span id="last-sync"></span></p>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbz5apiP8hUSVH8lCnnq0-nqq-BAkAgRd_-MOeZGHm2N9gjzUUNmBl6CZpIs1qx0B5K89g/exec';
    let myChart;

    // 데이터 가져오기 함수
    async function fetchData() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            // 데이터 구조에 맞춰 가공 (데이터가 배열 형태라고 가정)
            // 예: [{ "label": "A", "value": 10 }, ...]
            updateDashboard(data);
            console.log("Data Updated:", data);
        } catch (error) {
            console.error("Fetch Error:", error);
            document.getElementById('sync-status').innerText = "오류";
            document.getElementById('sync-status').style.color = "#e74c3c";
        }
    }

    // 대시보드 UI 업데이트 함수
    function updateDashboard(data) {
        // 1. 요약 카드 업데이트
        document.getElementById('total-count').innerText = data.length;
        
        // 데이터 구조에 따라 이 부분은 수정이 필요할 수 있습니다.
        // 마지막 데이터 값을 보여주는 예시
        if (data.length > 0) {
            const lastEntry = data[data.length - 1];
            // 'value'라는 키가 있다고 가정
            document.getElementById('last-value').innerText = lastEntry.value || lastEntry[Object.keys(lastEntry)[1]];
        }

        // 2. 차트 업데이트
        const labels = data.map((item, index) => item.date || index); // 날짜 혹은 인덱스
        const values = data.map(item => item.value || item[Object.keys(item)[1]]); // 첫 번째 숫자 컬럼

        if (myChart) {
            myChart.data.labels = labels;
            myChart.data.datasets[0].data = values;
            myChart.update();
        } else {
            initChart(labels, values);
        }

        // 3. 마지막 동기화 시간 표시
        const now = new Date();
        document.getElementById('last-sync').innerText = `최근 동기화: ${now.toLocaleTimeString()}`;
        document.getElementById('sync-status').innerText = "정상";
        document.getElementById('sync-status').style.color = "#2ecc71";
    }

    // 차트 초기화 함수
    function initChart(labels, values) {
        const ctx = document.getElementById('myChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line', // 차트 타입: line, bar, pie 등
            data: {
                labels: labels,
                datasets: [{
                    label: '시트 데이터 수치',
                    data: values,
                    borderColor: '#4a90e2',
                    backgroundColor: 'rgba(74, 144, 226, 0.2)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
    }

    // 초기 실행 및 30초마다 반복 실행 (실시간 연동)
    fetchData();
    setInterval(fetchData, 30000); // 30000ms = 30초
</script>

</body>
</html>
